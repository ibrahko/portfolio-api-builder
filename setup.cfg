[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --strict-markers
    -v

[coverage:run]
source = apps, shared
omit =
    */migrations/*
    */tests/*
    manage.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 80
